name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "Formula/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-formulas:
    runs-on: macos-latest

    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Tap local checkout
        run: brew tap AspireOne/tap "$GITHUB_WORKSPACE"

      - name: Audit formulas
        run: |
          set -euo pipefail

          formulas=(Formula/*.rb)
          if [ ! -e "${formulas[0]}" ]; then
            echo "No formulas found in Formula/" >&2
            exit 1
          fi

          for formula_path in "${formulas[@]}"; do
            formula="$(basename "$formula_path" .rb)"
            brew audit --strict --online "AspireOne/tap/$formula"
          done

      - name: Install formulas from source
        run: |
          set -euo pipefail

          formulas=(Formula/*.rb)
          for formula_path in "${formulas[@]}"; do
            formula="$(basename "$formula_path" .rb)"
            brew install --build-from-source "AspireOne/tap/$formula"
          done

      - name: Test formulas
        run: |
          set -euo pipefail

          formulas=(Formula/*.rb)
          for formula_path in "${formulas[@]}"; do
            formula="$(basename "$formula_path" .rb)"
            brew test "AspireOne/tap/$formula"
          done
